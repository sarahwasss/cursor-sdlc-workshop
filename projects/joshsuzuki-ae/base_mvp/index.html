<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Brick Breaker</title>
    <style>
      body {
        margin: 0;
        background: #12141c;
        color: #e8eaf2;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }
      canvas {
        background: linear-gradient(#1a2744 0%, #0f1628 100%);
        border: 2px solid rgba(232, 234, 242, 0.2);
        border-radius: 8px;
        cursor: crosshair;
      }
      .hint {
        font-size: 14px;
        opacity: 0.85;
        text-align: center;
        max-width: 520px;
      }
      kbd {
        background: rgba(232, 234, 242, 0.1);
        border: 1px solid rgba(232, 234, 242, 0.2);
        padding: 2px 6px;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="game" width="480" height="360" tabindex="0" aria-label="Brick Breaker game"></canvas>
      <div class="hint">
        <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> move · <kbd>Space</kbd> start / restart ·
        Mouse moves paddle when over the canvas
      </div>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const W = canvas.width;
        const H = canvas.height;

        const BALL_R = 6;
        const BALL_SPEED = 5;
        const PADDLE_W = 80;
        const PADDLE_H = 12;
        const PADDLE_Y = H - 36;
        const PADDLE_SPEED = 8;
        const BRICK_COLS = 5;
        const BRICK_ROWS = 3;
        const BRICK_PAD = 8;
        const BRICK_TOP = 48;
        const BRICK_GAP = 6;

        /** @type {'ready'|'playing'|'won'|'lost'} */
        let mode = "ready";
        let score = 0;

        const keys = { left: false, right: false };

        const paddle = {
          x: W / 2 - PADDLE_W / 2,
          y: PADDLE_Y,
          w: PADDLE_W,
          h: PADDLE_H,
        };

        const ball = {
          x: W / 2,
          y: PADDLE_Y - BALL_R - 2,
          r: BALL_R,
          vx: 2,
          vy: -BALL_SPEED,
        };

        /** @type {{ x:number,y:number,w:number,h:number,alive:boolean,row:number }[]} */
        let bricks = [];

        function brickColors(row) {
          const palette = ["#e74c3c", "#f39c12", "#27ae60"];
          return palette[row % palette.length];
        }

        function buildBricks() {
          bricks = [];
          const totalGap = BRICK_GAP * (BRICK_COLS - 1);
          const bw = Math.floor((W - 2 * BRICK_PAD - totalGap) / BRICK_COLS);
          const bh = 22;
          for (let row = 0; row < BRICK_ROWS; row++) {
            for (let col = 0; col < BRICK_COLS; col++) {
              const x = BRICK_PAD + col * (bw + BRICK_GAP);
              const y = BRICK_TOP + row * (bh + BRICK_GAP);
              bricks.push({ x, y, w: bw, h: bh, alive: true, row });
            }
          }
        }

        function aliveCount() {
          return bricks.filter((b) => b.alive).length;
        }

        function resetPlayingPositions() {
          paddle.x = W / 2 - PADDLE_W / 2;
          ball.x = paddle.x + PADDLE_W / 2;
          ball.y = paddle.y - BALL_R - 2;
          ball.vx = 2;
          ball.vy = -BALL_SPEED;
          const mag = Math.hypot(ball.vx, ball.vy) || 1;
          ball.vx = (ball.vx / mag) * BALL_SPEED;
          ball.vy = (ball.vy / mag) * BALL_SPEED;
        }

        function startGame() {
          buildBricks();
          score = 0;
          mode = "playing";
          resetPlayingPositions();
        }

        function restartFromEnd() {
          buildBricks();
          score = 0;
          mode = "playing";
          resetPlayingPositions();
        }

        function clampPaddle() {
          paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
        }

        function wallCollisions() {
          if (ball.x - ball.r < 0) {
            ball.x = ball.r;
            ball.vx *= -1;
          } else if (ball.x + ball.r > W) {
            ball.x = W - ball.r;
            ball.vx *= -1;
          }
          if (ball.y - ball.r < 0) {
            ball.y = ball.r;
            ball.vy *= -1;
          }
        }

        function paddleCollision() {
          if (ball.vy < 0) return;
          const px = paddle.x;
          const py = paddle.y;
          const pw = paddle.w;
          const ph = paddle.h;
          if (ball.y + ball.r < py) return;
          if (ball.y - ball.r > py + ph) return;
          if (ball.x + ball.r < px) return;
          if (ball.x - ball.r > px + pw) return;

          ball.y = py - ball.r;
          ball.vy *= -1;
          const cx = px + pw / 2;
          const offset = (ball.x - cx) / (pw / 2);
          ball.vx += offset * 3;
          const sp = Math.hypot(ball.vx, ball.vy) || 1;
          ball.vx = (ball.vx / sp) * BALL_SPEED;
          ball.vy = (ball.vy / sp) * BALL_SPEED;
        }

        /**
         * Circle vs AABB: push out and flip velocity on shallowest penetration axis.
         * @returns {boolean} true if brick was hit and destroyed
         */
        function resolveBrickCollision(brick) {
          if (!brick.alive) return false;
          const rx = brick.x;
          const ry = brick.y;
          const rw = brick.w;
          const rh = brick.h;
          const cx = ball.x;
          const cy = ball.y;
          const r = ball.r;

          const bx = rx + rw / 2;
          const by = ry + rh / 2;
          const dx = cx - bx;
          const dy = cy - by;
          const combinedHalfW = rw / 2 + r;
          const combinedHalfH = rh / 2 + r;
          if (Math.abs(dx) >= combinedHalfW || Math.abs(dy) >= combinedHalfH) return false;

          const overlapX = combinedHalfW - Math.abs(dx);
          const overlapY = combinedHalfH - Math.abs(dy);

          if (overlapX < overlapY) {
            ball.x += dx > 0 ? overlapX : -overlapX;
            ball.vx *= -1;
          } else {
            ball.y += dy > 0 ? overlapY : -overlapY;
            ball.vy *= -1;
          }

          brick.alive = false;
          score += 1;
          return true;
        }

        function tick() {
          if (mode !== "playing") return;

          let move = 0;
          if (keys.left) move -= 1;
          if (keys.right) move += 1;
          paddle.x += move * PADDLE_SPEED;
          clampPaddle();

          ball.x += ball.vx;
          ball.y += ball.vy;

          wallCollisions();
          paddleCollision();

          for (let i = 0; i < bricks.length; i++) {
            if (resolveBrickCollision(bricks[i])) break;
          }

          if (aliveCount() === 0) {
            mode = "won";
            return;
          }
          if (ball.y - ball.r > H) {
            mode = "lost";
          }
        }

        function drawHud() {
          ctx.font = "16px ui-sans-serif, system-ui, sans-serif";
          ctx.fillStyle = "#e8eaf2";
          ctx.textAlign = "left";
          ctx.fillText("Score: " + score, 12, 26);

          ctx.font = "14px ui-sans-serif, system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "rgba(232, 234, 242, 0.92)";

          if (mode === "ready") {
            ctx.fillText("Press Space to Start", W / 2, H / 2 - 8);
          } else if (mode === "won") {
            ctx.fillText("You Win — Press Space to Restart", W / 2, H / 2 - 8);
          } else if (mode === "lost") {
            ctx.fillText("Game Over — Press Space to Restart", W / 2, H / 2 - 8);
          }
        }

        function draw() {
          ctx.fillStyle = "#0f1628";
          ctx.fillRect(0, 0, W, H);

          for (const b of bricks) {
            if (!b.alive) continue;
            ctx.fillStyle = brickColors(b.row);
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeStyle = "rgba(0,0,0,0.25)";
            ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
          }

          ctx.fillStyle = "#7cb7ff";
          ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
          ctx.fillStyle = "#f5f0e6";
          ctx.fill();

          drawHud();
        }

        function loop() {
          tick();
          draw();
          requestAnimationFrame(loop);
        }

        window.addEventListener("keydown", (e) => {
          if (e.code === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = true;
          if (e.code === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
          if (e.code === "Space" || e.key === " ") {
            e.preventDefault();
            if (mode === "ready") startGame();
            else if (mode === "won" || mode === "lost") restartFromEnd();
          }
        });

        window.addEventListener("keyup", (e) => {
          if (e.code === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
          if (e.code === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
        });

        canvas.addEventListener("mousemove", (e) => {
          if (mode !== "playing") return;
          const rect = canvas.getBoundingClientRect();
          const sx = (e.clientX - rect.left) * (W / rect.width);
          paddle.x = sx - paddle.w / 2;
          clampPaddle();
        });

        canvas.addEventListener("click", () => {
          canvas.focus();
        });

        buildBricks();
        resetPlayingPositions();
        canvas.focus();
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
