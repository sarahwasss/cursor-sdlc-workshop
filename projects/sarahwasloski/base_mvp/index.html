<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
  }

  canvas {
    display: block;
    cursor: pointer;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .overlay.visible {
    pointer-events: auto;
    opacity: 1;
  }

  .overlay-bg {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(4px);
  }

  .overlay-content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #fff;
  }

  .game-title {
    font-size: 42px;
    font-weight: 800;
    color: #ffd700;
    text-shadow: 2px 3px 0 #b8860b, 0 0 20px rgba(255, 215, 0, 0.3);
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .subtitle {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 32px;
  }

  .tap-prompt {
    font-size: 20px;
    color: #fff;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .game-over-title {
    font-size: 36px;
    font-weight: 800;
    color: #ff4444;
    text-shadow: 2px 3px 0 #8b0000;
    margin-bottom: 24px;
  }

  .score-display {
    margin-bottom: 20px;
  }

  .score-label {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .score-value {
    font-size: 48px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
  }

  .best-score {
    font-size: 16px;
    color: #ffd700;
    margin-bottom: 32px;
  }

  .btn {
    background: #ffd700;
    color: #1a1a2e;
    border: none;
    padding: 14px 40px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4); }
  .btn:active { transform: translateY(0); }

  .sound-toggle {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.4);
    border: none;
    color: #fff;
    font-size: 22px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }

  .sound-toggle:hover { background: rgba(0, 0, 0, 0.6); }

  .new-best {
    color: #ffd700;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    animation: pulse 1s ease-in-out infinite;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="game"></canvas>

  <button class="sound-toggle" id="soundBtn" title="Toggle sound">🔊</button>

  <div class="overlay visible" id="readyOverlay">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
      <div class="game-title">Flappy Bird</div>
      <div class="subtitle">A simple tap-to-fly game</div>
      <div class="tap-prompt">Tap or Press Space to Start</div>
    </div>
  </div>

  <div class="overlay" id="gameOverOverlay">
    <div class="overlay-bg"></div>
    <div class="overlay-content">
      <div class="game-over-title">Game Over</div>
      <div id="newBestLabel" class="new-best" style="display:none">New Best!</div>
      <div class="score-display">
        <div class="score-label">Score</div>
        <div class="score-value" id="finalScore">0</div>
      </div>
      <div class="best-score">Best: <span id="bestScoreDisplay">0</span></div>
      <button class="btn" id="retryBtn">Retry</button>
    </div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const CANVAS_W = 400;
  const CANVAS_H = 600;
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;

  const readyOverlay = document.getElementById('readyOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const bestScoreEl = document.getElementById('bestScoreDisplay');
  const newBestLabel = document.getElementById('newBestLabel');
  const retryBtn = document.getElementById('retryBtn');
  const soundBtn = document.getElementById('soundBtn');

  // --- Audio (Web Audio API, no external files) ---
  let soundEnabled = true;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, duration, type, volume) {
    if (!soundEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function sfxFlap() { playTone(440, 0.08, 'sine', 0.12); }
  function sfxScore() {
    playTone(660, 0.08, 'sine', 0.15);
    setTimeout(() => playTone(880, 0.12, 'sine', 0.12), 60);
  }
  function sfxHit() { playTone(180, 0.15, 'sawtooth', 0.15); }
  function sfxDie() {
    playTone(300, 0.1, 'square', 0.12);
    setTimeout(() => playTone(200, 0.2, 'square', 0.1), 80);
    setTimeout(() => playTone(120, 0.3, 'square', 0.08), 180);
  }

  soundBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    soundEnabled = !soundEnabled;
    soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
  });

  // --- Game Constants ---
  const GRAVITY = 0.28;
  const FLAP_IMPULSE = -5.5;
  const TERMINAL_VEL = 7;
  const BIRD_X = 80;
  const BIRD_RADIUS = 14;
  const PIPE_WIDTH = 56;
  const PIPE_GAP = 160;
  const PIPE_SPEED = 2.2;
  const PIPE_SPAWN_INTERVAL = 110;
  const GROUND_H = 60;
  const GAP_MARGIN_TOP = 80;
  const GAP_MARGIN_BOTTOM = 80 + GROUND_H;

  // --- Colors ---
  const SKY_TOP = '#70c5ce';
  const SKY_BOTTOM = '#e8f0f2';
  const GROUND_COLOR = '#ded895';
  const GROUND_DARK = '#c4b56a';
  const PIPE_COLOR = '#5cb85c';
  const PIPE_DARK = '#4a9e4a';
  const PIPE_CAP_H = 24;
  const BIRD_BODY = '#f5c542';
  const BIRD_WING = '#e8a317';
  const BIRD_EYE_WHITE = '#fff';
  const BIRD_EYE_BLACK = '#333';
  const BIRD_BEAK = '#e87040';

  // --- State ---
  let state = 'ready'; // ready | playing | gameover
  let bird, pipes, score, bestScore, frameCount, shakeTimer, flashAlpha;

  bestScore = parseInt(localStorage.getItem('flappy_best') || '0', 10);

  function resetGame() {
    bird = { y: CANVAS_H / 2 - 30, vel: 0, rotation: 0 };
    pipes = [];
    score = 0;
    frameCount = 0;
    shakeTimer = 0;
    flashAlpha = 0;
  }

  resetGame();

  // --- Drawing helpers ---
  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H - GROUND_H);
    grad.addColorStop(0, SKY_TOP);
    grad.addColorStop(1, SKY_BOTTOM);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H - GROUND_H);
  }

  function drawGround() {
    const groundY = CANVAS_H - GROUND_H;
    ctx.fillStyle = GROUND_COLOR;
    ctx.fillRect(0, groundY, CANVAS_W, GROUND_H);
    ctx.fillStyle = GROUND_DARK;
    ctx.fillRect(0, groundY, CANVAS_W, 4);

    ctx.strokeStyle = GROUND_DARK;
    ctx.lineWidth = 1;
    const offset = (frameCount * PIPE_SPEED) % 24;
    for (let x = -offset; x < CANVAS_W; x += 24) {
      ctx.beginPath();
      ctx.moveTo(x, groundY + 12);
      ctx.lineTo(x + 12, groundY + 4);
      ctx.stroke();
    }
  }

  function drawClouds() {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    const offset = (frameCount * 0.3) % (CANVAS_W + 200);
    const clouds = [
      { x: 50, y: 60, r: 25 },
      { x: 80, y: 50, r: 30 },
      { x: 110, y: 60, r: 25 },
      { x: 250, y: 100, r: 20 },
      { x: 275, y: 90, r: 28 },
      { x: 300, y: 100, r: 22 },
    ];
    for (const c of clouds) {
      const cx = ((c.x - offset + CANVAS_W + 200) % (CANVAS_W + 200)) - 100;
      ctx.beginPath();
      ctx.arc(cx, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPipe(pipe) {
    const topH = pipe.gapY - PIPE_GAP / 2;
    const bottomY = pipe.gapY + PIPE_GAP / 2;
    const bottomH = CANVAS_H - GROUND_H - bottomY;

    // Top pipe body
    ctx.fillStyle = PIPE_COLOR;
    ctx.fillRect(pipe.x, 0, PIPE_WIDTH, topH);
    ctx.fillStyle = PIPE_DARK;
    ctx.fillRect(pipe.x, 0, 4, topH);
    ctx.fillRect(pipe.x + PIPE_WIDTH - 4, 0, 4, topH);

    // Top pipe cap
    ctx.fillStyle = PIPE_COLOR;
    ctx.fillRect(pipe.x - 4, topH - PIPE_CAP_H, PIPE_WIDTH + 8, PIPE_CAP_H);
    ctx.fillStyle = PIPE_DARK;
    ctx.fillRect(pipe.x - 4, topH - PIPE_CAP_H, PIPE_WIDTH + 8, 3);
    ctx.fillRect(pipe.x - 4, topH - 3, PIPE_WIDTH + 8, 3);

    // Bottom pipe body
    ctx.fillStyle = PIPE_COLOR;
    ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, bottomH);
    ctx.fillStyle = PIPE_DARK;
    ctx.fillRect(pipe.x, bottomY, 4, bottomH);
    ctx.fillRect(pipe.x + PIPE_WIDTH - 4, bottomY, 4, bottomH);

    // Bottom pipe cap
    ctx.fillStyle = PIPE_COLOR;
    ctx.fillRect(pipe.x - 4, bottomY, PIPE_WIDTH + 8, PIPE_CAP_H);
    ctx.fillStyle = PIPE_DARK;
    ctx.fillRect(pipe.x - 4, bottomY, PIPE_WIDTH + 8, 3);
    ctx.fillRect(pipe.x - 4, bottomY + PIPE_CAP_H - 3, PIPE_WIDTH + 8, 3);
  }

  function drawBird() {
    ctx.save();
    ctx.translate(BIRD_X, bird.y);
    ctx.rotate(bird.rotation);

    // Body
    ctx.fillStyle = BIRD_BODY;
    ctx.beginPath();
    ctx.ellipse(0, 0, BIRD_RADIUS + 2, BIRD_RADIUS, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing
    ctx.fillStyle = BIRD_WING;
    ctx.beginPath();
    const wingFlap = Math.sin(frameCount * 0.3) * 4;
    ctx.ellipse(-4, 2 + wingFlap, 10, 6, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eye white
    ctx.fillStyle = BIRD_EYE_WHITE;
    ctx.beginPath();
    ctx.arc(8, -4, 6, 0, Math.PI * 2);
    ctx.fill();

    // Eye pupil
    ctx.fillStyle = BIRD_EYE_BLACK;
    ctx.beginPath();
    ctx.arc(10, -4, 3, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = BIRD_BEAK;
    ctx.beginPath();
    ctx.moveTo(14, -2);
    ctx.lineTo(22, 2);
    ctx.lineTo(14, 6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawScore() {
    if (state !== 'playing') return;
    ctx.save();
    ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillText(score, CANVAS_W / 2 + 2, 62);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.lineWidth = 3;
    ctx.strokeText(score, CANVAS_W / 2, 60);
    ctx.fillText(score, CANVAS_W / 2, 60);
    ctx.restore();
  }

  // --- Collision ---
  function checkCollision() {
    const groundY = CANVAS_H - GROUND_H;
    if (bird.y + BIRD_RADIUS > groundY || bird.y - BIRD_RADIUS < 0) return true;

    for (const pipe of pipes) {
      const topH = pipe.gapY - PIPE_GAP / 2;
      const bottomY = pipe.gapY + PIPE_GAP / 2;

      if (BIRD_X + BIRD_RADIUS > pipe.x && BIRD_X - BIRD_RADIUS < pipe.x + PIPE_WIDTH) {
        if (bird.y - BIRD_RADIUS < topH || bird.y + BIRD_RADIUS > bottomY) {
          return true;
        }
      }
    }
    return false;
  }

  // --- Flap ---
  function flap() {
    ensureAudio();
    if (state === 'ready') {
      state = 'playing';
      readyOverlay.classList.remove('visible');
      resetGame();
      bird.vel = Math.min(bird.vel, 2);
      bird.vel = Math.min(bird.vel + FLAP_IMPULSE, FLAP_IMPULSE);
      sfxFlap();
      return;
    }
    if (state === 'playing') {
      // Cap downward momentum before applying flap so dives recover smoothly.
      bird.vel = Math.min(bird.vel, 2);
      bird.vel = Math.min(bird.vel + FLAP_IMPULSE, FLAP_IMPULSE);
      sfxFlap();
    }
  }

  // --- Game Over ---
  function triggerGameOver() {
    state = 'gameover';
    sfxHit();
    setTimeout(sfxDie, 150);
    shakeTimer = 12;
    flashAlpha = 0.6;

    let isNewBest = false;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('flappy_best', String(bestScore));
      isNewBest = true;
    }

    setTimeout(() => {
      finalScoreEl.textContent = score;
      bestScoreEl.textContent = bestScore;
      newBestLabel.style.display = isNewBest ? 'block' : 'none';
      gameOverOverlay.classList.add('visible');
    }, 500);
  }

  function retry() {
    gameOverOverlay.classList.remove('visible');
    state = 'playing';
    resetGame();
    bird.vel = FLAP_IMPULSE;
  }

  // --- Update ---
  function update() {
    if (state !== 'playing') return;

    frameCount++;

    // Bird physics
    bird.vel += GRAVITY;
    if (bird.vel > TERMINAL_VEL) bird.vel = TERMINAL_VEL;
    bird.y += bird.vel;

    // Ease into the target angle so the bird doesn't snap between frames.
    const targetRotation = bird.vel < 0
      ? Math.max(-0.4, bird.vel * 0.05)
      : Math.min(1.0, bird.vel * 0.07);
    bird.rotation += (targetRotation - bird.rotation) * 0.15;

    // Spawn pipes
    if (frameCount % PIPE_SPAWN_INTERVAL === 0) {
      const minGapY = GAP_MARGIN_TOP + PIPE_GAP / 2;
      const maxGapY = CANVAS_H - GAP_MARGIN_BOTTOM - PIPE_GAP / 2;
      const gapY = minGapY + Math.random() * (maxGapY - minGapY);
      pipes.push({ x: CANVAS_W, gapY, scored: false });
    }

    // Move and score pipes
    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;

      if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < BIRD_X) {
        pipes[i].scored = true;
        score++;
        sfxScore();
      }

      if (pipes[i].x + PIPE_WIDTH < -10) {
        pipes.splice(i, 1);
      }
    }

    // Collision
    if (checkCollision()) {
      triggerGameOver();
    }
  }

  // --- Render ---
  function render() {
    ctx.save();

    // Screen shake
    if (shakeTimer > 0) {
      shakeTimer--;
      const intensity = shakeTimer * 0.8;
      ctx.translate(
        (Math.random() - 0.5) * intensity * 2,
        (Math.random() - 0.5) * intensity * 2
      );
    }

    drawBackground();
    drawClouds();

    for (const pipe of pipes) drawPipe(pipe);

    drawGround();
    drawBird();
    drawScore();

    // Flash on death
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      flashAlpha -= 0.05;
    }

    ctx.restore();
  }

  // --- Game loop ---
  function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
  }

  // --- Ready screen idle animation ---
  function idleUpdate() {
    if (state === 'ready') {
      frameCount++;
      bird.y = CANVAS_H / 2 - 30 + Math.sin(frameCount * 0.05) * 12;
    }
  }
  const originalUpdate = update;

  function wrappedLoop() {
    if (state === 'ready') {
      idleUpdate();
    } else {
      update();
    }
    render();
    requestAnimationFrame(wrappedLoop);
  }

  // --- Input ---
  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    flap();
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      flap();
    }
  });

  retryBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    retry();
  });

  // Prevent double-tap zoom on mobile
  document.addEventListener('dblclick', (e) => e.preventDefault());

  // Start
  wrappedLoop();
})();
</script>
</body>
</html>
